name: Product Service CI/CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  AWS_REGION: ${{secrets.AWS_REGION}}
  ECR_REPOSITORY: ${{secrets.ECR_REPOSITORY}}
  EKS_CLUSTER_NAME: ${{secrets.EKS_CLUSTER_NAME}}
  DEPLOYMENT_NAME: product-service
  CONTAINER_NAME: product-service
  K8S_NAMESPACE: product-service
  IMAGE_TAG: ${{github.sha}}

jobs:
  deploy:
    name: deploy-product-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.projectKey=E-Commerce-Web-Application_Product-Service
            -Dsonar.organization=e-commerce-web-application
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION"

      - name: Build, tag, and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EKS
        env:
          DATABASE_URL: ${{secrets.DATABASE_URL}}
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/services.yaml

          kubectl -n "$K8S_NAMESPACE" create secret generic product-service-secrets \
            --from-literal=DATABASE="$DATABASE_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/deployment.yaml

          kubectl -n "$K8S_NAMESPACE" set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=${{steps.ecr-login.outputs.registry}}/$ECR_REPOSITORY:$IMAGE_TAG

          kubectl -n "$K8S_NAMESPACE" rollout restart deployment/$DEPLOYMENT_NAME

      - name: Verify deployment
        run: |
          echo "=== Checking rollout status ==="
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/$DEPLOYMENT_NAME --timeout=180s || {
            echo "\n=== Rollout failed. Checking pod events ==="
            kubectl -n "$K8S_NAMESPACE" describe deployment "$DEPLOYMENT_NAME"
            echo "\n=== Pod status ==="
            kubectl -n "$K8S_NAMESPACE" get pods -l app=product-service -o wide
            echo "\n=== Recent pod logs ==="
            kubectl -n "$K8S_NAMESPACE" logs -l app=product-service --tail=50 --all-containers=true || true
            exit 1
          }
          echo "\n=== Deployment successful ==="
          kubectl -n "$K8S_NAMESPACE" get deployment "$DEPLOYMENT_NAME" -o wide
          kubectl -n "$K8S_NAMESPACE" get pods -l app=product-service -o wide
