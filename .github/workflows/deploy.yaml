name: Product Service CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  DEPLOYMENT_NAME: product-service
  CONTAINER_NAME: product-service
  IMAGE_TAG: ${{ github.sha }}
  PYTHON_VERSION: "3.11"
  K8S_NAMESPACE: product-service

jobs:
  deploy:
    name: Build, Scan, and Deploy Product Service
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python for SonarCloud
        if: env.SONAR_TOKEN != ''
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies for SonarCloud
        if: env.SONAR_TOKEN != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate gRPC stubs for SonarCloud
        if: env.SONAR_TOKEN != ''
        run: make proto

      - name: SonarCloud Code Scan
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build, tag, and push Docker image to ECR
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Snyk Docker Image Scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          args: --auth-type=token --severity-threshold=high

      - name: Set up kubectl
        uses: Azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415
        with:
          version: v1.30.0

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Apply base Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/services.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Sync database secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" create secret generic product-service-secrets \
            --from-literal=DATABASE="$DATABASE_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply deployment manifest
        run: kubectl apply -f k8s/deployment.yaml

      - name: Deploy to EKS
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout restart deployment ${{ env.DEPLOYMENT_NAME }}

      - name: Verify deployment rollout
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=180s
          kubectl -n "${{ env.K8S_NAMESPACE }}" get deployment "${{ env.DEPLOYMENT_NAME }}" -o wide
          kubectl -n "${{ env.K8S_NAMESPACE }}" get pods -l app=product-service -o wide
