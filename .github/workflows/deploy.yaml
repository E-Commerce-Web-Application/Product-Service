name: Product Service CI/CD

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'Makefile'
      - 'k8s/**'
      - 'protos/**'
      - '.github/workflows/deploy.yaml'
  push:
    branches:
      - main
      - master
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'Makefile'
      - 'k8s/**'
      - 'protos/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  K8S_NAMESPACE: product-service
  DEPLOYMENT_NAME: product-service
  CONTAINER_NAME: product-service

concurrency:
  group: product-service-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: product_service
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d product_service"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE: postgresql://postgres:postgres@localhost:5432/product_service

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8

      - name: Generate gRPC stubs
        run: make proto

      - name: Run static checks
        run: |
          flake8 main.py grpc_server.py handlers.py database.py models.py schema.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m compileall .

      - name: Smoke test application imports
        run: |
          python - <<'PY'
          import os

          os.environ["DATABASE"] = os.environ["DATABASE"]

          import database
          import models
          import grpc_server
          import handlers
          import main

          models.Base.metadata.create_all(bind=database.engine)

          assert main.app.title == "Product Service"
          print("Smoke test passed.")
          PY

      - name: Validate Kubernetes manifests
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Dry-run Kubernetes resources
        run: |
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          kubectl apply --dry-run=client -f k8s/secret.yaml
          kubectl apply --dry-run=client -f k8s/services.yaml
          kubectl apply --dry-run=client -f k8s/deployment.yaml
          kubectl apply --dry-run=client -f k8s/ingress.yaml

  build:
    name: Build And Publish Image
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_repo: ${{ steps.image.outputs.image_repo }}
      image_tag: ${{ steps.image.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image coordinates
        id: image
        run: |
          echo "image_repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.image.outputs.image_repo }}:${{ steps.image.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Kubernetes
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      secrets.KUBE_CONFIG != '' &&
      secrets.DATABASE_URL != ''
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          if echo '${{ secrets.KUBE_CONFIG }}' | grep -q 'apiVersion:'; then
            printf '%s' '${{ secrets.KUBE_CONFIG }}' > "$HOME/.kube/config"
          else
            echo '${{ secrets.KUBE_CONFIG }}' | base64 -d > "$HOME/.kube/config"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/services.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Sync database secret
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" create secret generic product-service-secrets \
            --from-literal=DATABASE='${{ secrets.DATABASE_URL }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply deployment manifest
        run: kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ needs.build.outputs.image_repo }}:${{ needs.build.outputs.image_tag }}

      - name: Wait for rollout
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=180s

      - name: Show deployment status
        if: always()
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" get deployment "${{ env.DEPLOYMENT_NAME }}" -o wide || true
          kubectl -n "${{ env.K8S_NAMESPACE }}" get pods -l app=product-service -o wide || true
